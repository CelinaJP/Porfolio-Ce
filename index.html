
<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portfolio | Técnica en Programación</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:ital,wght@0,200..800;1,200..800&family=Archivo+Black&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background-color: #0a0a0c;
            color: #f8fafc;
            scroll-behavior: smooth;
        }
        .font-heading {
            font-family: 'Archivo Black', sans-serif;
            letter-spacing: -0.05em;
            line-height: 0.9;
        }
        .text-gradient {
            background: linear-gradient(135deg, #f8fafc 0%, #94a3b8 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .border-cool {
            border-color: rgba(148, 163, 184, 0.1);
        }
        .bg-cool-dark {
            background-color: #0f1115;
        }
        ::-webkit-scrollbar {
            width: 8px;
        }
        ::-webkit-scrollbar-track {
            background: #0a0a0c;
        }
        ::-webkit-scrollbar-thumb {
            background: #1e293b;
            border-radius: 10px;
        }

        /* Animación de bandera ondeante */
        @keyframes wave {
            0% { transform: rotate(0deg) translateY(0px); }
            25% { transform: rotate(5deg) translateY(-2px); }
            50% { transform: rotate(0deg) translateY(0px); }
            75% { transform: rotate(-5deg) translateY(-2px); }
            100% { transform: rotate(0deg) translateY(0px); }
        }
        .animate-wave {
            display: inline-block;
            animation: wave 2.5s ease-in-out infinite;
            transform-origin: bottom left;
        }
    </style>
